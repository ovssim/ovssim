<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<div id="coins"></div>

<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">Inventory</button>
  <button class="theme-btn" id="add-coins-btn">+10.01 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">-5.00 Coins</button>
  <button class="theme-btn" id="toggle-coinflip-btn">Coinflip Mode</button>
</div>

<!-- Case selection -->
<div id="case-select-wrapper">
  <select id="case-select"></select>
</div>

<!-- Case section -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Case Items</button>
    <div id="case-items-list"></div>
  </div>
</div>

<div id="winner-name"></div>

<!-- Coinflip Section -->
<div id="coinflip-section" class="hidden">
  <div id="coinflip-container">
    <div class="case-left">
      <h3>Bet</h3>
      <div id="bet-selection"></div>
    </div>
    <div class="case-right">
      <h3>Flip Result</h3>
      <div id="flip-result">?</div>
      <button class="theme-btn" id="flip-btn">Flip!</button>
    </div>
  </div>
</div>

<!-- Spinner -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Inventory</h2>
  <button id="sell-all-btn" class="theme-btn">Sell All</button>
</div>
<div id="inventory" class="hidden"></div>

<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<script src="script.js"></script>
</body>
</html>

  <script src="script.js"></script>
</body>
</html>
