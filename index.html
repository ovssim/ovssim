<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVFF’s Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF’s Sim</h1>
<div id="coins">Balance: 0.00</div>
<div class="inventory-header">
  <button id="toggle-inv-btn" class="theme-btn">Toggle Inventory</button>
  <button id="sell-all-btn" class="theme-btn">Sell All</button>
  <button id="add-coins-btn" class="theme-btn">+0.10 Coins</button>
  <button id="remove-coins-btn" class="theme-btn">-5 Coins</button>
</div>

<!-- ================= CASE SECTION ================= -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name">Select a Case</h2>
    <select id="case-select"></select>
    <button id="show-case-items-btn" class="theme-btn">Show Potential Items</button>
    <div id="case-items-list" class="hidden"></div>
    <button id="open-btn" class="theme-btn">Open Case</button>
  </div>
</div>

<!-- ================= SPINNER ================= -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>
<div id="winner-name"></div>

<!-- ================= INVENTORY ================= -->
<div id="inventory" class="hidden"></div>

<!-- ================= TOP DROPS ================= -->
<h2>Top Drops</h2>
<div id="top-drops"></div>

<!-- ================= COINFLIP ================= -->
<h2>Item Coinflip</h2>
<div id="coinflip-section">
  <select id="coinflip-item-select"></select>
  <button id="coinflip-heads" class="theme-btn">Heads</button>
  <button id="coinflip-tails" class="theme-btn">Tails</button>
  <div id="coinflip-result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
