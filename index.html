<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<!-- Neon New Banner -->
<div id="neon-banner">New Cases: Lights, Camera, Action! / 5th Dimension / Ekaflex </div>
<div id="neon-banner">Updates: Case Spinner Revamp</div>
<!-- Controls -->
<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">devving</button>
  <button class="theme-btn" id="add-coins-btn">50 Deposit</button>
  <button class="theme-btn" id="remove-coins-btn">50 Withdraw</button>
  <button class="theme-btn" id="admin-give-btn">Trade Panel</button>
</div>

<!-- Coinflip Section -->
<div id="coinflip-section">
  <h2>Coinflip</h2>
  <select id="coinflip-select"></select>
  <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
  <div id="coin-container">
    <div id="coin">
      <div class="head"></div>
      <div class="tail"></div>
    </div>
  </div>
</div>

<!-- Coins Display -->
<div id="coins"></div>

<!-- Case selection (Custom dropdown) -->
<div class="custom-dropdown">
  <div id="case-select-display"></div>
  <div id="case-select-options"></div>
</div>

<!-- Case section -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Potential Drops</button>
    <div id="case-items-list"></div>
  </div>
</div>

<!-- Winner Name -->
<div id="winner-name"></div>
  
<!-- Spinner -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

<!-- Winner Name -->
<div id="winner-name"></div>
  
<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Backpack</h2>
  <button id="sell-all-btn" class="theme-btn">Scrap Backpack</button>
</div>
<div id="inventory"></div>

<!-- Top Drops -->
<h2 class="top-title">• Latest TOP Drops</h2>
<div id="top-drops"></div>

<div id="upgrader-panel">
  <h2>Item Upgrader</h2>
  
  <div id="upgrader-selection">
    <div>
      <h3>Base Item</h3>
      <select id="base-item-select"></select>
    </div>
    <div>
      <h3>Wager Items</h3>
      <div id="wager-items-container"></div>
    </div>
    <div>
      <h3>Target Item</h3>
      <select id="target-item-select"></select>
    </div>
  </div>

  <div id="upgrade-chance-container">
    <svg width="120" height="120" viewBox="0 0 100 100">
      <polygon id="upgrade-hexagon" points="50,1 95,25 95,75 50,99 5,75 5,25"
               fill="#555" stroke="#00FF00" stroke-width="3" />
    </svg>
    <div id="chance-label">0.01%</div>
  </div>

  <button id="upgrade-btn">Upgrade!</button>
</div>
  
<!-- Admin Panel -->
<div id="admin-give-panel" style="display:none;">
  <div id="admin-give-header">
    <span>Trading Mode</span>
    <button id="admin-give-close">✖</button>
  </div>
  <div id="admin-give-items"></div>
</div>
