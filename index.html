<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TF2 Case Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>TF2 Case Opening Simulator</h1>

  <!-- Coins Display -->
  <div id="coins"></div>

  <!-- Case -->
  <div id="case-container"></div>
  <button id="open-btn">Open Case</button>
  
  <!-- Spinning strip -->
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>

  <!-- Result of the case opening -->
  <div id="result"></div>

  <!-- Inventory -->
  <h2>Inventory</h2>
  <div id="inventory"></div>

  <script src="script.js"></script>
</body>
</html>
