<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<!-- Neon New Banner -->
<div id="neon-banner">New: COINFLIP </div>

<!-- Coins Display -->
<div id="coins"></div>

<!-- Controls -->
<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">devving</button>
  <button class="theme-btn" id="add-coins-btn">+0.10 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">Donate To Charity</button>
</div>

<!-- Coinflip Section -->
<div id="coinflip-section">
  <h2>Coinflip</h2>
  <select id="coinflip-select"></select>
  <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
  <div id="coin-container">
    <div id="coin">
      <div class="head"></div>
      <div class="tail"></div>
    </div>
  </div>
</div>

<!-- Case selection -->
<div id="case-select-wrapper" class="custom-dropdown">
  <div id="case-select-display">Select a Case ▼</div>
  <div id="case-select-options" class="options"></div>
</div>

<!-- Case section -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Potential Items</button>
    <div id="case-items-list"></div>
  </div>
</div>

<!-- Winner Name -->
<div id="winner-name"></div>

<!-- Spinner -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Backpack</h2>
  <button id="sell-all-btn" class="theme-btn">Scrap Backpack</button>
</div>
<div id="inventory"></div>

<!-- Top Drops -->
<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
