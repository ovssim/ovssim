<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<!-- banners -->
<div id="neon-banner">Version 3 </div>
<div id="neon-banner">Upgrader</div>
<!-- Controls -->
<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">devving</button>
  <button class="theme-btn" id="add-coins-btn">0.05 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">50 Withdraw</button>
  <button class="theme-btn" id="admin-give-btn">Trade Panel</button>
</div>

<!-- Coinflip Section -->
<div id="coinflip-section">
  <h2>Coinflip</h2>
  <select id="coinflip-select"></select>
  <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
  <div id="coin-container">
    <div id="coin">
      <div class="head"></div>
      <div class="tail"></div>
    </div>
  </div>
</div>

<!-- Coins Display -->
<div id="coins"></div>

<!-- Case selection (Custom dropdown) -->
<div class="custom-dropdown">
  <div id="case-select-display"></div>
  <div id="case-select-options"></div>
</div>

<!-- Case section -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Potential Drops</button>
    <div id="case-items-list"></div>
  </div>
</div>

  <!-- win item name -->
<div id="winner-name"></div>

<!-- Spinner -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

  <button id="sort-inv-btn" class="theme-btn cyan-btn">
  Sort: High → Low
</button>
  
<!-- backpack -->
<div class="inventory-header">
  <h2>Backpack</h2>
  <button id="sell-all-btn" class="theme-btn">Scrap Backpack</button>
</div>
<div id="inventory"></div>

  <button id="refresh-upgrader-btn" class="theme-btn">Refresh Items</button>
  
  <!-- ================= UPGRADER ================= -->
<div id="upgrader-section">
  <h2>Upgrader</h2>

  <div id="upgrader-ui">
    <div class="upgrader-side">
      <h3>Wager</h3>
      <div id="wager-list"></div>
    </div>

    <div class="upgrader-side">
      <h3>Target</h3>
      <div id="target-list"></div>
    </div>
  </div>

  <div id="upgrade-bar">
  <div id="upgrade-fill"></div>
</div>
  <div id="upgrade-info">
    <div id="upgrade-chance">Chance: 0%</div>
    <div id="upgrade-value">0 ⛃ → 0 ⛃</div>
  </div>
<div id="chance-bar">
  <div id="chance-fill"></div>
</div>
  <div id="upgrade-circle" class="upgrade-circle">
  <div id="upgrade-circle-fill"></div>
  <div id="upgrade-circle-text">0%</div>
</div>
<div id="upgrade-wheel-wrapper">
  <canvas id="upgrade-wheel"></canvas>
</div>

  <button id="upgrade-btn" class="theme-btn">Upgrade</button>
</div>
  
<!-- Top Drops -->
<h2 class="top-title">• Latest TOP Drops</h2>
<div id="top-drops"></div>

<!-- trading panel -->
<div id="admin-give-panel" style="display:none;">
  <div id="admin-give-header">
    <span>Trading Mode</span>
    <button id="admin-give-close">✖</button>
  </div>
  <div id="admin-give-items"></div>
</div>
