<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<div id="coins"></div>

<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">Button Of Muck and Malice</button>
  <button class="theme-btn" id="toggle-mode-btn">Switch to Coinflip 🎲</button>
  <button class="theme-btn" id="add-coins-btn">+0.10 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">Donate To Charity</button>
</div>

<!-- Case selection -->
<div id="case-select-wrapper">
  <select id="case-select"></select>
</div>

<!-- Case section -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Potential Items</button>
    <div id="case-items-list"></div>
  </div>
</div>

<div id="winner-name"></div>

  <!-- COINFLIP SECTION -->
<div id="coinflip-section" class="hidden">
  <h2>Coinflip Mode 🎲</h2>

  <div id="coinflip-inventory"></div>

  <div id="coinflip-selected"></div>

  <button class="theme-btn" id="coinflip-btn">Flip Coin</button>

  <div id="coinflip-result"></div>
</div>
  <div id="chip-wrapper">
  <div id="poker-chip">
    <div class="chip-face chip-front">WIN</div>
    <div class="chip-face chip-back">LOSE</div>
  </div>
</div>
  
<!-- Spinner -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Inventory</h2>
  <button id="sell-all-btn" class="theme-btn">Sell All</button>
</div>

<div id="inventory" class="hidden"></div>

<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<script src="script.js"></script>
</body>
</html>
