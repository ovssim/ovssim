<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's TF2 Cases</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Cases</h1>

<div id="coins"></div>

<div id="controls">
  <button id="toggle-inv-btn">Toggle Inventory</button>
  <button id="add-coins-btn">+0.10 Coins</button>
  <button id="remove-coins-btn">-0.04 Coins</button>
</div>

<div id="case-select-wrapper">
  <button id="show-select-btn">Select Case</button>
  <select id="case-select" class="hidden"></select>
</div>

<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button id="open-btn"></button>
    <button id="view-items-btn">View Case Items</button>
  </div>
</div>

<div id="winner-name"></div>

<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

<h2>Inventory</h2>
<div id="inventory" class="hidden"></div>

<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<!-- Case Items Modal -->
<div id="case-items-modal" class="modal hidden">
  <div class="modal-content">
    <h2>Case Items</h2>
    <div id="case-items-list"></div>
    <button id="close-modal-btn">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
