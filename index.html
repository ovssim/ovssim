<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TF2Easy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>TF2Easy</h1>
<h3 id="coins-display">Coins: 1000</h3>

<!-- ================= GAME MODE SWITCH ================= -->
<div id="gamemode-switch">
  <button class="theme-btn active-mode" id="cases-mode-btn">Cases</button>
  <button class="theme-btn" id="coinflip-mode-btn">Coinflip</button>
</div>

<!-- ================= CASES MODE ================= -->
<div id="cases-mode">

  <h2>Select Case</h2>
  <select id="case-select"></select>
  <button class="theme-btn" id="open-case-btn">Open Case</button>

  <div id="spinner-container">
    <div id="spinner"></div>
  </div>

  <div id="winner-display"></div>

</div>

<!-- ================= COINFLIP MODE ================= -->
<div id="coinflip-mode" class="hidden">

  <h2>Coinflip</h2>

  <div id="coinflip-selected"></div>

  <h3>Possible Win</h3>
  <div id="coinflip-preview"></div>

  <div id="coin">
    <div class="coin-inner">
      <div class="coin-face heads">WIN</div>
      <div class="coin-face tails">LOSE</div>
    </div>
  </div>

  <button class="theme-btn" id="coinflip-btn" disabled>Flip Coin</button>
  <div id="coinflip-result"></div>

</div>

<!-- ================= INVENTORY ================= -->
<h2>Your Inventory</h2>
<div id="inventory"></div>

<script src="cases.json"></script>
<script src="script.js"></script>
</body>
</html>
