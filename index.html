<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<!-- Neon New Banner -->
<div id="neon-banner">New: COINFLIP & BATTLES</div>

<!-- Coins Display -->
<div id="coins"></div>

<!-- Controls -->
<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">devving</button>
  <button class="theme-btn" id="add-coins-btn">+50 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">Donate To Charity</button>
  <button class="theme-btn" id="toggle-mode-btn">Switch to Case Battle</button>
</div>

<!-- ================= MAIN SECTION ================= -->
<div id="main-section">
  <!-- Coinflip Section -->
  <div id="coinflip-section">
    <h2>Coinflip</h2>
    <select id="coinflip-select"></select>
    <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
    <div id="coin-container">
      <div id="coin">
        <div class="head"></div>
        <div class="tail"></div>
      </div>
    </div>
  </div>

  <!-- Case selection -->
  <div id="case-select-wrapper">
    <div class="custom-dropdown">
      <div id="case-select-display"></div>
      <div id="case-select-options"></div>
    </div>
  </div>

  <!-- Case section -->
  <div id="case-section">
    <div class="case-left">
      <img id="case-image" src="" alt="Case Image">
    </div>
    <div class="case-right">
      <h2 id="case-name"></h2>
      <button class="theme-btn" id="open-btn"></button>
      <button class="theme-btn" id="show-case-items-btn">Show Potential Items</button>
      <div id="case-items-list"></div>
    </div>
  </div>

  <!-- Winner Name -->
  <div id="winner-name"></div>

  <!-- Spinner -->
  <div id="spinner-wrapper">
    <div id="spinner-container">
      <div id="spinner-strip"></div>
    </div>
  </div>
</div>

<!-- ================= BATTLE SECTION ================= -->
<div id="battle-section" style="display:none;">
  <h2>Case Battle Mode</h2>
  <p>Each battle costs the selected case price.</p>

  <div id="battle-spinners">
    <div id="battle-player" class="battle-column">
      <h3>Player</h3>
      <div id="battle-spinner-container" class="spinner-container">
        <div id="battle-spinner-player-strip" class="spinner-strip"></div>
      </div>
    </div>

    <div id="battle-bot" class="battle-column">
      <h3>Bot</h3>
      <div id="battle-spinner-container" class="spinner-container">
        <div id="battle-spinner-bot-strip" class="spinner-strip"></div>
      </div>
    </div>
  </div>

  <button class="theme-btn" id="battle-btn">Start Battle</button>
  <div id="battle-winner" style="margin-top:20px; font-size:20px; font-weight:bold;"></div>
</div>

<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Inventory</h2>
  <button id="sell-all-btn" class="theme-btn">Sell All</button>
</div>
<div id="inventory"></div>

<!-- Top Drops -->
<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
