<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's TF2 Cases</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Cases</h1>

<div id="coins"></div>

<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">Toggle Inventory</button>
  <button class="theme-btn" id="add-coins-btn">+10.00 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">-0.04 Coins</button>
</div>

<div id="case-select-wrapper">
  <select id="case-select"></select>
</div>

<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Case Items</button>
    <div id="case-items-list"></div>
  </div>
</div>

<div id="winner-name"></div>

<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

<h2>Inventory</h2>
<div id="inventory" class="hidden"></div>

<h2>Coinflip</h2>
<div id="coinflip-section">

  <div id="coinflip-selected"></div>

  <div id="coin">
    <div class="coin-inner">
      <div class="coin-face heads">WIN</div>
      <div class="coin-face tails">LOSE</div>
    </div>
  </div>

  <button class="theme-btn" id="coinflip-btn" disabled>Flip Coin (2x)</button>
  <div id="coinflip-result"></div>

</div>

<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<script src="script.js"></script>
</body>
</html>

<h2>Coinflip</h2>
<div id="coinflip-section">

  <div id="coinflip-selected"></div>

  <h3>Possible Win</h3>
  <div id="coinflip-preview"></div>

  <div id="coin">
    <div class="coin-inner">
      <div class="coin-face heads">WIN</div>
      <div class="coin-face tails">LOSE</div>
    </div>
  </div>

  <button class="theme-btn" id="coinflip-btn" disabled>Flip Coin</button>
  <div id="coinflip-result"></div>

</div>
