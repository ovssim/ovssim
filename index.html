<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ovff’s Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="neon-banner">ovff’s Sim</h1>
<div id="coins"></div>
<button id="switch-mode-btn" class="theme-btn">Case Battle</button>

<!-- NORMAL CASE + COINFLIP SECTION -->
<div id="normal-section">

  <!-- CASE SECTION -->
  <div id="case-section">
    <div class="case-left">
      <img id="case-image" src="">
    </div>
    <div class="case-right">
      <h2 id="case-name"></h2>
      <div class="custom-dropdown">
        <div id="case-select-display"></div>
        <div id="case-select-options"></div>
      </div>
      <button id="show-case-items-btn" class="theme-btn">Show Potential Drops</button>
      <div id="case-items-list"></div>
      <button id="open-btn" class="theme-btn"></button>
    </div>
  </div>

  <!-- SPINNER -->
  <div id="spinner-wrapper">
    <div id="spinner-container">
      <div id="spinner-strip"></div>
    </div>
    <div id="winner-name"></div>
  </div>

  <!-- COINFLIP SECTION -->
  <div id="coinflip-section">
    <select id="coinflip-select"></select><br>
    <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
    <div id="coin-container">
      <div id="coin"></div>
    </div>
    <button id="add-coins-btn" class="theme-btn">+0.10 Coins</button>
    <button id="remove-coins-btn" class="theme-btn">Charity</button>
  </div>

  <!-- INVENTORY -->
  <div class="inventory-header">
    <h2>Inventory</h2>
    <button id="sell-all-btn" class="theme-btn">Scrap Backpack</button>
  </div>
  <div id="inventory"></div>

  <!-- TOP DROPS -->
  <h2>• Last TOP Drops</h2>
  <div id="top-drops"></div>

</div>

<!-- CASE BATTLE SECTION -->
<div id="battle-section" style="display:none;">
  <h2>Case Battle</h2>
  <div class="custom-dropdown">
    <select id="battle-case-select"></select>
  </div>
  <button id="battle-start-btn" class="theme-btn"></button>
  
  <div style="display:flex; justify-content:center; gap:40px; margin-top:20px;">
    <div>
      <h3>Player</h3>
      <div id="battle-spinner-player">
        <div id="battle-spinner-player-strip"></div>
      </div>
    </div>
    <div>
      <h3>Bot</h3>
      <div id="battle-spinner-bot">
        <div id="battle-spinner-bot-strip"></div>
      </div>
    </div>
  </div>
  <div id="battle-winner" style="margin-top:20px; font-weight:bold;"></div>
</div>

<script src="script.js"></script>
</body>
</html>
