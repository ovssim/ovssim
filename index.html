<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OVFFs Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>OVFFs Sim </h1>
  <div id="coins">Coins: 0</div>

  <!-- ================= CASE SECTION ================= -->
  <div id="case-section">
    <div class="case-left">
      <img id="case-image" src="">
    </div>
    <div class="case-right">
      <h2 id="case-name"></h2>
      <select id="case-select"></select>
      <button id="open-btn" class="theme-btn">Open</button>
      <button id="show-case-items-btn" class="theme-btn">Show Case Items</button>
      <div id="case-items-list" style="display:none;"></div>
    </div>
  </div>

  <!-- ================= SPINNER ================= -->
  <div id="spinner-wrapper">
    <div id="spinner-container">
      <div id="spinner-strip"></div>
    </div>
    <div id="winner-name"></div>
  </div>

  <!-- ================= INVENTORY ================= -->
  <div class="inventory-header">
    <button id="toggle-inv-btn" class="theme-btn">Toggle Inventory</button>
    <button id="sell-all-btn">Sell All</button>
    <button id="add-coins-btn">+1 Coin</button>
    <button id="remove-coins-btn">-5 Coins</button>
  </div>
  <div id="inventory"></div>

  <!-- ================= TOP DROPS ================= -->
  <h2>Top Drops</h2>
  <div id="top-drops"></div>

  <!-- ================= COINFLIP ================= -->
  <hr>
  <h2>Coinflip 🎲</h2>
  <input type="number" id="bet-amount" placeholder="Bet coins" min="0" step="0.01">
  <select id="bet-choice">
    <option value="heads">Heads</option>
    <option value="tails">Tails</option>
  </select>
  <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
  <div id="coinflip-result"></div>
  <h3>Select items to bet:</h3>
  <div id="bet-items"></div>

  <script src="script.js"></script>
</body>
</html>
