<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TF2 Case Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>TF2 Case Opening Simulator</h1>

  <!-- Coins Display -->
  <div id="coins" aria-live="polite"></div>

  <!-- Case -->
  <div id="case-container"></div>
  <button id="open-btn">Open Case</button>
  
  <!-- Spinner with arrows -->
  <div id="spinner-wrapper">
    <div id="spinner-container">
      <div id="spinner-strip"></div>
    </div>
    <!-- arrows as actual elements -->
    <div class="winner-arrow" id="winner-left">&#9654;</div>
    <div class="winner-arrow" id="winner-right">&#9664;</div>
  </div>

  <!-- Result of the case opening -->
  <div id="result" aria-live="polite"></div>

  <!-- Inventory -->
  <h2>Inventory</h2>
  <div id="inventory"></div>

  <script src="script.js"></script>
</body>
</html>
