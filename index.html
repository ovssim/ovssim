<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Coinflip & Case Opener</title>
<style>
/* ================= GLOBAL ================= */
body {
  margin: 0;
  padding: 20px;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1a1f, #0b0b0f);
  color: white;
  text-align: center;
}

h1 { margin-bottom: 10px; font-weight: 600; }
#coins { font-size: 18px; font-weight: bold; margin-bottom: 20px; }

/* ================= BUTTON THEME ================= */
.theme-btn {
  background: linear-gradient(135deg, #ff9500, #ffb347);
  border: none;
  padding: 10px 22px;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
  transition: all 0.2s ease;
}
.theme-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px orange;
}

/* ================= CASE SECTION ================= */
#case-section {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 40px;
  background: rgba(25,25,30,0.8);
  backdrop-filter: blur(8px);
  padding: 30px;
  border-radius: 20px;
  max-width: 950px;
  margin: 0 auto 30px auto;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.case-left img {
  width: 220px;
  border-radius: 15px;
}

.case-right h2 { margin-bottom: 15px; }

#case-items-list {
  margin-top: 10px;
  max-height: 300px;
  overflow-y: auto;
}

/* ================= OPEN BUTTON ================= */
#open-btn {
  margin-top: 10px;
  display: inline-block;
}

/* ================= WINNER NAME ================= */
#winner-name {
  font-size: 22px;
  font-weight: bold;
  margin: 20px 0;
}

/* ================= SPINNER ================= */
#spinner-wrapper { width: 1000px; max-width: 95%; margin: 20px auto; }
#spinner-container {
  height: 170px;
  overflow: hidden;
  background: rgba(20,20,25,0.9);
  backdrop-filter: blur(6px);
  border-radius: 15px;
  border: 2px solid #333;
  position: relative;
}
#spinner-strip {
  display: flex;
  align-items: center;
  transition: transform 6s cubic-bezier(.08,.6,0,1);
}
#spinner-container::after {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  width: 4px;
  height: 100%;
  background: gold;
  border-radius: 2px;
  box-shadow: 0 0 15px gold, 0 0 35px orange;
  z-index: 10;
}
.spinner-item {
  flex: 0 0 auto;
  width: 110px;
  height: 140px;
  margin: 15px;
  background: #1a1a22;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
.spinner-item img { width: 70px; height: 70px; object-fit: contain; }
.highlight-won {
  animation: glowScale 1.5s ease-in-out infinite alternate;
  z-index: 20;
}
@keyframes glowScale {
  0%   { transform: scale(1); box-shadow: 0 0 15px currentColor; }
  50%  { transform: scale(1.25); box-shadow: 0 0 35px currentColor; }
  100% { transform: scale(1); box-shadow: 0 0 15px currentColor; }
}

/* ================= INVENTORY ================= */
#inventory {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}
.inv-item {
  width: 140px;
  padding: 15px;
  background: rgba(25,25,30,0.8);
  backdrop-filter: blur(6px);
  border-radius: 15px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.inv-item:hover { transform: translateY(-6px); }
.inv-item img { width: 70px; height: 70px; object-fit: contain; }
.sell-btn {
  margin-top: 8px;
  padding: 6px;
  background: #ff9500;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
  font-size: 13px;
}

/* ================= TOP DROPS ================= */
#top-drops {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 30px;
}
.top-drop {
  width: 170px;
  padding: 15px;
  background: rgba(25,25,30,0.8);
  backdrop-filter: blur(6px);
  border-radius: 18px;
}
.top-drop img { width: 75px; height: 75px; object-fit: contain; }

/* ================= RARITY SYSTEM ================= */
.common     { border: 2px solid #777; box-shadow: 0 0 10px #777; color: #bbb; }
.rare       { border: 2px solid #4aa3ff; box-shadow: 0 0 14px #4aa3ff; color: #4aa3ff; }
.strange    { border: 2px solid orange; box-shadow: 0 0 16px orange; color: orange; }
.unusual    { border: 2px solid purple; box-shadow: 0 0 18px purple; color: purple; }
.legendary  { border: 2px solid gold; box-shadow: 0 0 22px gold; color: gold; }
.mythical   { border: 2px solid violet; box-shadow: 0 0 24px violet; color: violet; }
.genuine    { border: 2px solid #4D7455; box-shadow: 0 0 16px #4D7455; color: #4D7455; }
.vintage    { border: 2px solid #476291; box-shadow: 0 0 16px #476291; color: #476291; }
.collector  { border: 2px solid #AA0000; box-shadow: 0 0 22px #AA0000; color: #AA0000; }
.haunted    { border: 2px solid #38F3AB; box-shadow: 0 0 18px #38F3AB; color: #38F3AB; }

/* ================= COINFLIP ================= */
#coinflip-mode {
  background: rgba(25,25,30,0.85);
  padding: 20px;
  border-radius: 18px;
  max-width: 500px;
  margin: 30px auto;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}
#coinflip-mode h2 { margin-bottom: 15px; }
#coinflip-result { margin-top: 15px; font-size: 18px; font-weight: bold; }

/* Coinflip button */
#flip-btn { margin-top: 10px; }
</style>
</head>
<body>

<h1>Case Opener & Item Coinflip</h1>
<div id="coins"></div>

<!-- Case Section -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <select id="case-select"></select>
    <button id="open-btn" class="theme-btn">Open Case</button>
    <div id="case-items-list" style="display:none;"></div>
    <p id="winner-name"></p>
  </div>
</div>

<!-- Inventory -->
<div class="inventory-header">
  <button id="toggle-inv-btn" class="theme-btn">Toggle Inventory</button>
  <button id="sell-all-btn">Sell All Items</button>
</div>
<div id="inventory"></div>

<!-- Top Drops -->
<h3>Top Drops</h3>
<div id="top-drops"></div>

<!-- Coinflip Mode -->
<div id="coinflip-mode">
  <h2>Item Coinflip 🎲</h2>
  <label for="item-wager">Select an item to wager:</label>
  <select id="item-wager"></select>
  <button id="flip-btn" class="theme-btn">Flip Coin</button>
  <p id="coinflip-result"></p>
</div>

<script>
// ===================== GLOBAL STATE =====================
let coins = parseFloat(localStorage.getItem("coins")) || 100;
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
let cases = [];
let currentCase = null;
let recentDrops = JSON.parse(localStorage.getItem("recentDrops")) || [];

// ===================== INIT =====================
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("sell-all-btn").onclick = sellAllItems;
  document.getElementById("toggle-inv-btn").onclick = () =>
    document.getElementById("inventory").classList.toggle("hidden");

  updateCoins();
  renderInventory();
  renderTopDrops();
  loadCases();
  updateItemWagerDropdown();
});

// ===================== COINS =====================
function updateCoins() {
  document.getElementById("coins").textContent = `Balance: ${coins.toFixed(2)}`;
  localStorage.setItem("coins", coins);
}

// ===================== INVENTORY =====================
function saveInventory() {
  localStorage.setItem("inventory", JSON.stringify(inventory));
  localStorage.setItem("recentDrops", JSON.stringify(recentDrops));
}

function addToInventory(item) {
  inventory.push(item);
  recentDrops.push(item);
  if (recentDrops.length > 20) recentDrops.shift();
  saveInventory();
  renderInventory();
  renderTopDrops();
}

function renderInventory() {
  const inv = document.getElementById("inventory");
  inv.innerHTML = "";

  inventory.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = `inv-item ${item.rarity.toLowerCase()}`;
    div.innerHTML = `
      <img src="${item.image}">
      <p>${item.name}</p>
      <small>${item.price} coins</small>
      <button class="sell-btn theme-btn">Sell</button>
    `;
    div.querySelector(".sell-btn").onclick = () => {
      coins += item.price;
      inventory.splice(index, 1);
      saveInventory();
      updateCoins();
      renderInventory();
      updateItemWagerDropdown();
    };
    inv.appendChild(div);
  });
}

function sellAllItems() {
  if (inventory.length === 0) { alert("Inventory is empty!"); return; }
  const totalValue = inventory.reduce((sum, i) => sum + i.price, 0);
  coins += totalValue;
  inventory = [];
  saveInventory();
  updateCoins();
  renderInventory();
  updateItemWagerDropdown();
  alert(`Sold all items for ${totalValue.toFixed(2)} coins!`);
}

function renderTopDrops() {
  const c = document.getElementById("top-drops");
  c.innerHTML = "";

  [...recentDrops].sort((a,b)=>b.price-a.price).slice(0,8)
    .forEach(i => {
      const d = document.createElement("div");
      d.className = `top-drop ${i.rarity.toLowerCase()}`;
      d.innerHTML = `<img src="${i.image}"><p>${i.name}</p><strong>${i.price} coins</strong>`;
      c.appendChild(d);
    });
}

// ===================== LOAD CASES =====================
function loadCases() {
  fetch("data/cases.json")
    .then(r => r.json())
    .then(data => {
      cases = data.cases;
      const select = document.getElementById("case-select");
      select.innerHTML = "";
      cases.forEach(c => {
        const option = document.createElement("option");
        option.value = c.id;
        option.textContent = `${c.name} (${c.price} coins)`;
        select.appendChild(option);
      });
      select.onchange = () => selectCase(select.value);
      selectCase(cases[0].id);
    });
}

function selectCase(id) {
  currentCase = cases.find(c=>c.id===id);
  if(!currentCase) return;
  document.getElementById("case-image").src = currentCase.image;
  document.getElementById("case-name").textContent = currentCase.name;
  document.getElementById("open-btn").textContent = `Open for ${currentCase.price} Coins`;
}

// ===================== ITEM COINFLIP =====================
function updateItemWagerDropdown() {
  const select = document.getElementById("item-wager");
  select.innerHTML = "";
  if(inventory.length===0){
    const option = document.createElement("option");
    option.textContent = "No items available"; option.disabled=true;
    select.appendChild(option);
    document.getElementById("flip-btn").disabled = true;
    return;
  }
  inventory.forEach((item,index)=>{
    const option=document.createElement("option");
    option.value=index;
    option.textContent=`${item.name} (${item.rarity})`;
    select.appendChild(option);
  });
  document.getElementById("flip-btn").disabled=false;
}

document.getElementById("flip-btn").addEventListener("click",()=>{
  const select = document.getElementById("item-wager");
  const index = parseInt(select.value);
  if(isNaN(index) || !inventory[index]) return alert("Select an item!");
  const item = inventory[index];
  const resultEl = document.getElementById("coinflip-result");
  const win = Math.random()<0.5;
  if(win){
    inventory.push({...item});
    resultEl.textContent = `You won! You got another ${item.name} 🎉`;
  } else {
    inventory.splice(index,1);
    resultEl.textContent = `You lost your ${item.name} 😢`;
  }
  saveInventory();
  renderInventory();
  updateItemWagerDropdown();
});
</script>
</body>
</html>
